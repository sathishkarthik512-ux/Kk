<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday my dearest brother 🎂</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
  color: white;
}

/* Title */
h1 {
  margin-top: 50px;
  font-size: 40px;
  animation: fadeIn 2s ease-in-out;
}

/* Button */
button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: #ff4b5c;
  color: white;
  cursor: pointer;
  margin-top: 20px;
  animation: pulse 2s infinite;
}

button:hover {
  transform: scale(1.1);
}

/* Countdown */
#countdown {
  font-size: 30px;
  margin-top: 20px;
}

/* Hearts animation */
.hearts span {
  position: absolute;
  display: block;
  width: 20px;
  height: 20px;
  background: red;
  animation: animate 10s linear infinite;
  bottom: -150px;
  border-radius: 50%;
}

@keyframes animate {
  0% { transform: translateY(0) scale(0); }
  100% { transform: translateY(-1000px) scale(1); }
}

@keyframes pulse {
  0% { box-shadow: 0 0 10px #ff4b5c; }
  50% { box-shadow: 0 0 25px #ff4b5c; }
  100% { box-shadow: 0 0 10px #ff4b5c; }
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* Slideshow */
img {
  width: 250px;
  border-radius: 15px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday my dearest thambi 🎂</h1>

<div id="countdown"></div>

<button onclick="playMusic()">🎵 Tap to Start</button>

<!-- Slideshow -->
<img id="photo" src="https://via.placeholder.com/250x250/ff9a9e/ffffff?text=Photo+1">

<!-- Audio -->
<audio id="music" loop>
  <source src="Ma.mp3" type="audio/mpeg">
</audio>

<!-- Hearts -->
<div class="hearts">
  <span style="left:10%"></span>
  <span style="left:30%"></span>
  <span style="left:50%"></span>
  <span style="left:70%"></span>
  <span style="left:90%"></span>
</div>

<script>
// 🎵 Music
const audio = document.getElementById("music");

function playMusic() {
  audio.play();
}

// Auto play after first tap
document.body.addEventListener("click", function () {
  audio.play();
}, { once: true });

// ⏳ Countdown (SET DATE HERE)
var countDownDate = new Date("May 19, 2026 00:00:00").getTime();

var x = setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  var minutes = Math.floor((distance / 1000 / 60) % 60);
  var seconds = Math.floor((distance / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "🎉 It's Birthday Time!";
  }
}, 1000);

// 📸 Slideshow
const photos = [
  "https://via.placeholder.com/250x250/ff9a9e/ffffff?text=Photo+1",
  "https://via.placeholder.com/250x250/fad0c4/ffffff?text=Photo+2",
  "https://via.placeholder.com/250x250/ff6b9d/ffffff?text=Photo+3"
];
let i = 0;

setInterval(() => {
  i = (i + 1) % photos.length;
  document.getElementById("photo").src = photos[i];
}, 3000);
</script>

</body>
</html>
